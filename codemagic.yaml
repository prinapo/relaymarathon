workflows:
  ios-build:
    name: iOS Build (Quasar Capacitor)
    environment:
      node: 22
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build Quasar app
        script: |
          npx quasar build -m capacitor -T ios --skip-pkg

      - name: Build iOS app
        script: |
          cd src-capacitor/ios/App
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $CM_BUILD_DIR/build/App.xcarchive \
                     archive

    artifacts:
      - build/**/*