workflows:
  ios-build:
    name: iOS Build (Quasar Capacitor)
    environment:
      node: 18
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build Quasar app
        script: |
          npx quasar build -m capacitor -T ios

      - name: Install CocoaPods
        script: |
          cd src-capacitor/ios
          pod install

      - name: Build iOS app
        script: |
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $CM_BUILD_DIR/build/App.xcarchive \
                     archive

    artifacts:
      - build/**/*