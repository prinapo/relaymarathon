apply plugin: 'com.android.application'

def projectRootDir = rootProject.projectDir.parentFile?.parentFile
def releaseKeystorePropertiesFile = projectRootDir != null
    ? new File(projectRootDir, 'keystore.properties')
    : rootProject.file('keystore.properties')
def legacyReleaseKeystorePropertiesFile = rootProject.file('keystore.properties')
def releaseKeystoreProperties = new Properties()

if (releaseKeystorePropertiesFile.exists()) {
    releaseKeystorePropertiesFile.withInputStream { stream ->
        releaseKeystoreProperties.load(stream)
    }
}
else if (legacyReleaseKeystorePropertiesFile.exists()) {
    legacyReleaseKeystorePropertiesFile.withInputStream { stream ->
        releaseKeystoreProperties.load(stream)
    }
}

def envOrProp = { envName, propName ->
    def envValue = System.getenv(envName)
    if (envValue != null && envValue.trim()) {
        return envValue.trim()
    }

    def propValue = releaseKeystoreProperties.getProperty(propName)
    return propValue != null && propValue.trim() ? propValue.trim() : null
}

def releaseStoreFileValue = envOrProp('ANDROID_RELEASE_STORE_FILE', 'storeFile')
def releaseStorePasswordValue = envOrProp('ANDROID_RELEASE_STORE_PASSWORD', 'storePassword')
def releaseKeyAliasValue = envOrProp('ANDROID_RELEASE_KEY_ALIAS', 'keyAlias')
def releaseKeyPasswordValue = envOrProp('ANDROID_RELEASE_KEY_PASSWORD', 'keyPassword')
def releaseStoreFile = null

if (releaseStoreFileValue) {
    if (projectRootDir != null) {
        releaseStoreFile = new File(projectRootDir, releaseStoreFileValue)
    }

    if (releaseStoreFile == null || releaseStoreFile.exists() == false) {
        releaseStoreFile = rootProject.file(releaseStoreFileValue)
    }
}
def hasReleaseSigning = releaseStoreFile != null
    && releaseStoreFile.exists()
    && releaseStorePasswordValue
    && releaseKeyAliasValue
    && releaseKeyPasswordValue

android {
    namespace = "com.prinapo.relaymarathon"
    compileSdk = rootProject.ext.compileSdkVersion

    def userProfile = System.getenv("USERPROFILE")
    def explicitDebugKeystore = userProfile ? new File(userProfile, ".android/debug.keystore") : null

    signingConfigs {
        if (explicitDebugKeystore != null && explicitDebugKeystore.exists()) {
            debug {
                storeFile explicitDebugKeystore
                storePassword "android"
                keyAlias "androiddebugkey"
                keyPassword "android"
            }
        }

        if (hasReleaseSigning) {
            release {
                storeFile releaseStoreFile
                storePassword releaseStorePasswordValue
                keyAlias releaseKeyAliasValue
                keyPassword releaseKeyPasswordValue
            }
        }
    }

    defaultConfig {
        applicationId "com.prinapo.relaymarathon"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 6
        versionName "1.5.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        debug {
            if (explicitDebugKeystore != null && explicitDebugKeystore.exists()) {
                signingConfig signingConfigs.debug
            }
        }
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

gradle.taskGraph.whenReady { taskGraph ->
    def wantsReleaseBuild = taskGraph.allTasks.any { task ->
        def name = task.name?.toLowerCase()
        return name?.contains('release') && (name.contains('bundle') || name.contains('assemble'))
    }

    if (wantsReleaseBuild && hasReleaseSigning == false) {
        throw new GradleException(
            'Release signing non configurata. Crea src-capacitor/android/keystore.properties '
            + '(puoi partire da keystore.properties.example) oppure imposta le variabili '
            + 'ANDROID_RELEASE_STORE_FILE, ANDROID_RELEASE_STORE_PASSWORD, '
            + 'ANDROID_RELEASE_KEY_ALIAS, ANDROID_RELEASE_KEY_PASSWORD.'
        )
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

