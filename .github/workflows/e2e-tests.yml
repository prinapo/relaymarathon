name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  EMULATOR_PROJECT: demo-emulator

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Firebase Emulator
        run: |
          firebase emulators:start \
            --only firestore,auth \
            --project=${{ env.EMULATOR_PROJECT }} \
            --import=test-data/seed.json \
            --export-on-exit=test-results/emulator-data &
          echo "Waiting for emulator to start..."
          sleep 20
          curl -s http://localhost:8080 || echo "Emulator may still be starting"

      - name: Verify emulator is running
        run: |
          echo "Checking emulator status..."
          sleep 5
          curl -s "http://localhost:8080/v1/projects/${{ env.EMULATOR_PROJECT }}/databases/(default)/documents" || true

      - name: Build app
        run: npx quasar build

      - name: Kill any process on port 9000
        run: |
          fuser -k 9000/tcp 2>/dev/null || true
          sleep 2

      - name: Start dev server
        run: |
          npm run dev &
          echo "Waiting for dev server..."
          sleep 15

      - name: Run E2E tests
        run: npx playwright test tests/e2e --reporter=list --timeout=30000 --retries=1
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ github.run_number }}
          path: test-results/**/test-failed-*.png
          retention-days: 30

      - name: Stop emulator
        if: always()
        run: pkill -f "firebase emulators" || true

  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || true
        continue-on-error: true

      - name: Check formatting
        run: |
          npm run format -- --check || echo "Formatting issues found"
        continue-on-error: true